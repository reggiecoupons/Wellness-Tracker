<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Wellness</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16161b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wellness">
<link rel="apple-touch-icon" href="icon.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- v10 -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { height: 100%; background: #0d0d10; color: #eae8f2; font-family: -apple-system, sans-serif; }

#app { display: flex; flex-direction: column; min-height: 100%; }

.log-date { font-size: 13px; color: #5a586c; font-weight: 600; margin-bottom: 14px; padding-top: 4px; }

.content { flex: 1; overflow-y: auto; padding-bottom: 110px; }
.panel { display: none; padding: 16px; }
.panel.active { display: block; }

/* Tab bar */
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #16161b; border-top: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: row; align-items: flex-start; z-index: 999; height: 84px; padding-top: 6px; padding-bottom: 24px; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; color: #5a586c; font-family: inherit; cursor: pointer; padding: 0; transition: color 0.15s; }
.tab.active { color: #8b7ff5; }
.tab svg { width: 22px; height: 22px; }
.tab span { font-size: 10px; font-weight: 600; }

.sec { font-size: 11px; color: #5a586c; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 600; }

/* Cards */
.card { background: #16161b; border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.07); border-top: 3px solid var(--cc, #333); }
.card.hi { border-top-color: var(--cc); }

.cat-hdr { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.cat-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--cc); flex-shrink: 0; }
.cat-label { font-size: 15px; font-weight: 700; color: #eae8f2; }
.cat-hint { font-size: 11px; color: #5a586c; margin-left: auto; background: rgba(255,255,255,0.05); padding: 3px 9px; border-radius: 8px; font-weight: 500; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { background: #1e1e26; border: 1.5px solid rgba(255,255,255,0.1); color: #9a98ac; font-size: 13px; padding: 8px 14px; border-radius: 10px; font-family: inherit; cursor: pointer; white-space: nowrap; font-weight: 500; transition: all 0.12s; }
.chip.on { background: var(--cc); border-color: var(--cc); color: #fff; font-weight: 700; }
.chip.rest-on { background: #2a2a35; border-color: #5a586c; color: #9a98ac; font-weight: 600; }

.w-row { display: flex; align-items: center; gap: 8px; }
.w-lbl { font-size: 12px; color: #5a586c; white-space: nowrap; font-weight: 500; }
.w-group { display: flex; }
.w-group .chip { border-radius: 0; border-right-width: 0; }
.w-group .chip:first-child { border-radius: 10px 0 0 10px; }
.w-group .chip:last-child { border-radius: 0 10px 10px 0; border-right-width: 1.5px; }

.note { width: 100%; background: #1e1e26; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: #eae8f2; font-size: 14px; padding: 10px 12px; font-family: inherit; margin-top: 12px; resize: none; outline: none; }
.save-btn { width: 100%; padding: 15px; background: #8b7ff5; border: none; color: #fff; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 6px; letter-spacing: 0.01em; }
.save-btn:active { opacity: 0.85; transform: scale(0.99); }
.back-btn { background: #1e1e26; border: 1px solid rgba(255,255,255,0.1); color: #9a98ac; font-size: 13px; padding: 7px 16px; border-radius: 20px; font-family: inherit; cursor: pointer; margin-bottom: 14px; display: none; font-weight: 600; }
.ok-msg { text-align: center; font-size: 13px; color: #3daa78; margin-top: 10px; display: none; font-weight: 600; }

/* Calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav button { background: #16161b; border: 1px solid rgba(255,255,255,0.1); color: #9a98ac; width: 34px; height: 34px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-family: inherit; }
.cal-month { font-size: 17px; font-weight: 800; color: #eae8f2; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dow { font-size: 10px; color: #5a586c; text-align: center; padding: 4px 0; font-weight: 700; }
.cal-day { aspect-ratio: 1; background: #16161b; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 5px 2px 3px; cursor: pointer; overflow: hidden; position: relative; }
.cal-day.empty { background: transparent; border-color: transparent; pointer-events: none; }
.cal-day.today { border: 2px solid #8b7ff5; }
.cal-day:active { opacity: 0.6; }
.cal-num { font-size: 12px; color: #9a98ac; line-height: 1; font-weight: 600; }
.cal-day.today .cal-num { color: #8b7ff5; font-weight: 800; }
.cal-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 3px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
.cal-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
.cal-bar-inner { height: 100%; background: linear-gradient(90deg, #8b7ff5, #5bb8d4); }
.cal-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.cal-leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #9a98ac; font-weight: 500; }

/* Week summary */
.wsec { margin-top: 20px; }
.wsec-title { font-size: 11px; font-weight: 700; color: #5a586c; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.07em; }
.wcard { background: #16161b; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
.wcard-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.wcard-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #eae8f2; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 8px; font-weight: 700; }
.badge.met { background: rgba(61,170,120,0.2); color: #3daa78; }
.badge.no { background: rgba(255,255,255,0.05); color: #5a586c; }
.wrows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.wrow { display: flex; justify-content: space-between; font-size: 13px; }
.wrow-l { color: #5a586c; }
.wrow-v { color: #eae8f2; font-weight: 600; }
.prog-bar { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; }
.goal-txt { font-size: 11px; color: #5a586c; margin-top: 6px; font-weight: 500; }

/* Trends */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat { background: #16161b; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 14px; }
.stat-l { font-size: 10px; color: #5a586c; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 700; }
.stat-v { font-size: 28px; font-weight: 800; color: #eae8f2; }
.stat-s { font-size: 11px; color: #9a98ac; margin-top: 3px; }
.tchart { background: #16161b; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.tchart-l { font-size: 13px; color: #9a98ac; margin-bottom: 14px; font-weight: 700; }
.trend-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tbtn { background: #1e1e26; border: 1.5px solid rgba(255,255,255,0.1); color: #5a586c; font-size: 12px; padding: 6px 12px; border-radius: 20px; font-family: inherit; cursor: pointer; font-weight: 500; -webkit-tap-highlight-color: transparent; user-select: none; position: relative; z-index: 0; }
.tbtn.on { background: var(--tc); border-color: var(--tc); color: #fff; font-weight: 700; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar-fill { width: 100%; border-radius: 5px 5px 0 0; min-height: 2px; }
.bar-lbl { font-size: 9px; color: #5a586c; font-weight: 600; }
.hm-row { display: flex; gap: 3px; align-items: center; margin-bottom: 4px; }
.hm-l { font-size: 10px; color: #5a586c; width: 60px; text-align: right; padding-right: 8px; flex-shrink: 0; font-weight: 500; }
.hm-cell { flex: 1; height: 14px; border-radius: 3px; }

/* Goals */
.goal-card { background: #16161b; border: 1px solid rgba(255,255,255,0.07); border-top: 3px solid var(--gc, #333); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.goal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.goal-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #eae8f2; }
.goal-pct { font-size: 14px; font-weight: 800; }
.goal-bar { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.goal-fill { height: 100%; border-radius: 3px; }
.goal-detail { font-size: 13px; color: #9a98ac; line-height: 1.6; }
.goal-target { font-size: 11px; color: #5a586c; margin-top: 5px; font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div class="content">
    <div id="panel-log" class="panel active">
      <div class="log-date" id="hdr-sub"></div>
      <button class="back-btn" id="back-btn" onclick="goToday()">&#8592; Back to today</button>
      <div id="log-body"></div>
      <button class="save-btn" id="save-btn" onclick="saveLog()">Save today's log</button>
      <div class="ok-msg" id="ok-msg">Saved &#10003;</div>
    </div>
    <div id="panel-calendar" class="panel">
      <div class="cal-nav">
        <button onclick="calAdj(-1)">&#8249;</button>
        <div class="cal-month" id="cal-month"></div>
        <button onclick="calAdj(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend" id="cal-legend"></div>
      <div class="wsec">
        <div class="wsec-title"><div style="width:7px;height:7px;border-radius:50%;background:#8b7ff5"></div>This week</div>
        <div id="week-sum"></div>
      </div>
    </div>
    <div id="panel-trends" class="panel">
      <div class="stats-grid" id="tstats"></div>
      <div class="trend-btns" id="tbtns"></div>
      <div class="tchart"><div class="tchart-l">7-day history</div><div class="bar-chart" id="bar-chart"></div></div>
      <div class="tchart"><div class="tchart-l">4-week heatmap</div><div id="heatmap"></div></div>
    </div>
    <div id="panel-goals" class="panel">
      <div id="goals-body"></div>
    </div>
  </div>
  <div class="tabbar">
    <button class="tab active" id="tab-log" onclick="showTab('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
      <span>Log</span>
    </button>
    <button class="tab" id="tab-calendar" onclick="showTab('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Calendar</span>
    </button>
    <button class="tab" id="tab-trends" onclick="showTab('trends')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Trends</span>
    </button>
    <button class="tab" id="tab-goals" onclick="showTab('goals')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Goals</span>
    </button>
  </div>
</div>
<script>
var CATS = [
  { id:'sleep',     label:'Sleep',     color:'#8b7ff5', hint:'last night\'s sleep',    type:'single',
    opts:['4 or less','5','6','7','8','9 or more'], hrs:[3.5,5,6,7,8,9.5] },
  { id:'exercise',  label:'Exercise',  color:'#3daa78', hint:'activity', type:'exercise' },
  { id:'nutrition', label:'Nutrition', color:'#e8923a', hint:'quality',  type:'single',
    opts:['1','2','3','4','5'] },
  { id:'energy',    label:'Energy',    color:'#d4567a', hint:'level',    type:'single',
    opts:['1 - Low','2 - Moderate','3 - High'] },
  { id:'stretch',   label:'Stretch',   color:'#5bb8d4', hint:'sessions', type:'single',
    opts:['0','1','2'] }
];
var CARDIO  = ['Run','Bike','Hike'];
var LIFTING = ['Pull','Push','Legs'];

var logDate = td();
var S = {};

function freshS() {
  S = { sleep:null, exercise:[], nutrition:null, energy:null, stretch:null, notes:{} };
}
freshS();

function td() {
  var d = new Date();
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
}
function p2(n){ return n<10?'0'+n:''+n; }
function ds(y,m,d){ return y+'-'+p2(m+1)+'-'+p2(d); }
function lsKey(d){ return 'wc_'+d; }
function lsSave(d,v){ try{ localStorage.setItem(lsKey(d),JSON.stringify(v)); }catch(e){} }
function lsLoad(d){ try{ return JSON.parse(localStorage.getItem(lsKey(d))||'null'); }catch(e){ return null; } }

function apiSaveLog(date, data) {
  fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: date, data: data })
  }).catch(function() {});
}

function syncFromServer(cb) {
  fetch('/api/logs').then(function(res) {
    return res.json();
  }).then(function(serverLogs) {
    Object.keys(serverLogs).forEach(function(date) { lsSave(date, serverLogs[date]); });
    if (!localStorage.getItem('wc_synced')) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && /^wc_\d{4}-\d{2}-\d{2}$/.test(k)) keys.push(k);
      }
      keys.filter(function(k) { return !serverLogs[k.replace('wc_','')]; })
        .forEach(function(k) { apiSaveLog(k.replace('wc_',''), JSON.parse(localStorage.getItem(k))); });
      localStorage.setItem('wc_synced','1');
    }
    cb();
  }).catch(function() { cb(); });
}

function score(catId, entry) {
  if (!entry) return 0;
  var cat = CATS.find(function(c){ return c.id===catId; });
  if (cat.type==='exercise') {
    if (!entry.selected || entry.selected.length===0) return 0;
    if (entry.selected.length===1 && entry.selected[0]==='Rest') return 0;
    return 5;
  }
  var idx = cat.opts.indexOf(entry.selected);
  if (idx<0) return 0;
  if (catId==='sleep') return [1,2,3,4,5,5][idx]||0;
  if (catId==='nutrition') return idx+1;
  if (catId==='energy') return [1,3,5][idx]||0;
  if (catId==='stretch') return [0,3,5][idx]||0;
  return 0;
}
function sleepHrs(entry) {
  if (!entry||!entry.selected) return 0;
  var idx = CATS[0].opts.indexOf(entry.selected);
  return idx<0 ? 0 : CATS[0].hrs[idx];
}
function dayScore(log) {
  if (!log) return 0;
  var t=0,n=0;
  CATS.forEach(function(c){ var s=score(c.id,log[c.id]); if(s>0){t+=s;n++;} });
  return n>0 ? t/n : 0;
}

function getWeekDays() {
  var now = new Date();
  var dow = now.getDay();
  var off = dow===0 ? -6 : 1-dow;
  var days = [];
  for (var i=0;i<7;i++) {
    var d = new Date(now); d.setDate(now.getDate()+off+i);
    var s = d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    days.push({ ds:s, log:lsLoad(s), future:d>now });
  }
  return days;
}

function openLog(dateStr) {
  logDate = dateStr;
  freshS();
  var ex = lsLoad(dateStr);
  if (ex) {
    S.sleep     = ex.sleep     ? ex.sleep.selected     : null;
    S.exercise  = ex.exercise  ? (ex.exercise.selected||[])  : [];
    S.nutrition = ex.nutrition ? ex.nutrition.selected : null;
    S.energy    = ex.energy    ? ex.energy.selected    : null;
    S.stretch   = ex.stretch   ? ex.stretch.selected   : null;
    S.notes     = ex.notes || {};
  }
  var isToday = dateStr===td();
  var backBtn = document.getElementById('back-btn');
  backBtn.style.display = isToday ? 'none' : 'block';
  var sub = document.getElementById('hdr-sub');
  var parts = dateStr.split('-');
  sub.textContent = new Date(+parts[0],+parts[1]-1,+parts[2]).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('save-btn').textContent = isToday ? "Save today's log" : "Save log";
  renderCards();
  showTab('log', true);
}

function goToday(){ openLog(td()); }

function renderCards() {
  var body = document.getElementById('log-body');
  body.innerHTML = '';
  CATS.forEach(function(cat) {
    var card = document.createElement('div');
    card.className = 'card' + (hasValue(cat) ? ' hi' : '');
    card.style.setProperty('--cc', cat.color);
    card.innerHTML = '<div class="cat-hdr"><div class="cat-dot"></div><div class="cat-label">'+cat.label+'</div><div class="cat-hint">'+cat.hint+'</div></div><div id="ci-'+cat.id+'"></div><textarea class="note" id="cn-'+cat.id+'" rows="1" placeholder="Notes...">'+(S.notes[cat.id]||'')+'</textarea>';
    body.appendChild(card);
    renderCatInput(cat);
  });
}

function hasValue(cat) {
  if (cat.type==='exercise') return S.exercise.length>0;
  return S[cat.id] !== null;
}

function renderCatInput(cat) {
  var wrap = document.getElementById('ci-'+cat.id);
  if (!wrap) return;
  wrap.innerHTML = '';

  if (cat.type==='single') {
    var row = document.createElement('div'); row.className='chips';
    cat.opts.forEach(function(opt) {
      var b = document.createElement('button');
      b.className = 'chip' + (S[cat.id]===opt ? ' on' : '');
      b.style.setProperty('--cc', cat.color);
      b.textContent = opt;
      b.onclick = function() {
        S[cat.id] = S[cat.id]===opt ? null : opt;
        renderCatInput(cat);
        updCard(cat);
      };
      row.appendChild(b);
    });
    wrap.appendChild(row);

  } else if (cat.type==='exercise') {
    var block = document.createElement('div');
    block.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

    // Row 1: Cardio label + chips
    var r1 = document.createElement('div'); r1.className='w-row';
    var cl = document.createElement('span'); cl.className='w-lbl'; cl.textContent='Cardio';
    var cg = document.createElement('div'); cg.className='chips'; cg.style.flex='1';
    CARDIO.forEach(function(opt) {
      var b = document.createElement('button');
      b.className='chip'+(S.exercise.indexOf(opt)!==-1?' on':'');
      b.style.setProperty('--cc',cat.color); b.textContent=opt;
      b.onclick=function(){ toggleEx(opt); renderCatInput(cat); updCard(cat); };
      cg.appendChild(b);
    });
    var bo = document.createElement('button');
    bo.className='chip'+(S.exercise.indexOf('Other')!==-1?' on':'');
    bo.style.setProperty('--cc',cat.color); bo.textContent='Other';
    bo.onclick=function(){ toggleEx('Other'); renderCatInput(cat); updCard(cat); };
    cg.appendChild(bo);
    r1.appendChild(cl); r1.appendChild(cg);

    // Row 2: Weights label + connected pills
    var r2 = document.createElement('div'); r2.className='w-row';
    var wl = document.createElement('span'); wl.className='w-lbl'; wl.textContent='Weights';
    var wg = document.createElement('div'); wg.className='w-group';
    LIFTING.forEach(function(opt) {
      var key='Weights — '+opt;
      var b=document.createElement('button');
      b.className='chip'+(S.exercise.indexOf(key)!==-1?' on':'');
      b.style.setProperty('--cc',cat.color); b.textContent=opt;
      b.onclick=function(){ toggleEx(key); renderCatInput(cat); updCard(cat); };
      wg.appendChild(b);
    });
    r2.appendChild(wl); r2.appendChild(wg);

    // Row 3: Rest day
    var r3 = document.createElement('div'); r3.className='chips';
    var br = document.createElement('button');
    var isRest = S.exercise.length===1 && S.exercise[0]==='Rest';
    br.className='chip'+(isRest?' rest-on':'');
    br.textContent='Rest day';
    br.onclick=function(){
      S.exercise = isRest ? [] : ['Rest'];
      renderCatInput(cat); updCard(cat);
    };
    r3.appendChild(br);

    block.appendChild(r1); block.appendChild(r2); block.appendChild(r3);
    wrap.appendChild(block);
  }
}

function toggleEx(opt) {
  var sel = S.exercise;
  var ri = sel.indexOf('Rest');
  if (opt!=='Rest' && ri!==-1) sel.splice(ri,1);
  var i = sel.indexOf(opt);
  if (i===-1) sel.push(opt); else sel.splice(i,1);
}

function updCard(cat) {
  var card = document.getElementById('ci-'+cat.id);
  if (!card) return;
  var parent = card.parentElement;
  if (!parent) return;
  parent.classList.toggle('hi', hasValue(cat));
}

function saveLog() {
  var entry = {};
  CATS.forEach(function(cat) {
    var n = document.getElementById('cn-'+cat.id);
    var note = n ? n.value : '';
    if (cat.type==='exercise') {
      entry[cat.id] = { selected: S.exercise.slice(), note: note };
    } else {
      entry[cat.id] = { selected: S[cat.id], note: note };
    }
  });
  lsSave(logDate, entry);
  apiSaveLog(logDate, entry);
  var ok = document.getElementById('ok-msg');
  ok.style.display='block'; setTimeout(function(){ ok.style.display='none'; },2000);
}

var calY = new Date().getFullYear(), calM = new Date().getMonth();

function buildCal() {
  document.getElementById('cal-month').textContent =
    new Date(calY,calM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var grid = document.getElementById('cal-grid');
  grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(function(d){
    var h=document.createElement('div'); h.className='cal-dow'; h.textContent=d; grid.appendChild(h);
  });
  var first=new Date(calY,calM,1).getDay();
  var days=new Date(calY,calM+1,0).getDate();
  var today=td();
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(var d=1;d<=days;d++){
    var s=ds(calY,calM,d);
    var log=lsLoad(s);
    var cell=document.createElement('div');
    cell.className='cal-day'+(s===today?' today':'');
    var dotsHtml='';
    if(log){
      CATS.forEach(function(c){ if(score(c.id,log[c.id])>0) dotsHtml+='<div class="cal-dot" style="background:'+c.color+'"></div>'; });
    }
    var pct=log?Math.round((dayScore(log)/5)*100):0;
    cell.innerHTML='<div class="cal-num">'+d+'</div><div class="cal-dots">'+dotsHtml+'</div><div class="cal-bar"><div class="cal-bar-inner" style="width:'+pct+'%"></div></div>';
    (function(date){ cell.onclick=function(){ openLog(date); }; })(s);
    grid.appendChild(cell);
  }
  var leg=document.getElementById('cal-legend'); leg.innerHTML='';
  CATS.forEach(function(c){
    var i=document.createElement('div');i.className='cal-leg';
    i.innerHTML='<div style="width:7px;height:7px;border-radius:50%;background:'+c.color+'"></div>'+c.label;
    leg.appendChild(i);
  });
  buildWeekSum();
}

function calAdj(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} buildCal(); }

function buildWeekSum() {
  var wdays = getWeekDays();
  var logged = wdays.filter(function(w){ return w.log&&!w.future; });
  var container = document.getElementById('week-sum');
  container.innerHTML='';

  function wcard(cat, rows, pct, met, goalLabel) {
    var d=document.createElement('div'); d.className='wcard';
    var rHtml=rows.map(function(r){ return '<div class="wrow"><span class="wrow-l">'+r.l+'</span><span class="wrow-v">'+r.v+'</span></div>'; }).join('');
    d.innerHTML='<div class="wcard-hdr"><div class="wcard-name"><div style="width:9px;height:9px;border-radius:50%;background:'+cat.color+'"></div>'+cat.label+'</div><span class="badge '+(met?'met':'no')+'">'+(met?'Goal met \u2713':'In progress')+'</span></div><div class="wrows">'+rHtml+'</div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+cat.color+'"></div></div><div class="goal-txt">Goal: '+goalLabel+'</div>';
    container.appendChild(d);
  }

  var hrs=logged.reduce(function(s,w){ return s+sleepHrs(w.log['sleep']); },0);
  var d8=logged.filter(function(w){ return sleepHrs(w.log['sleep'])>=8; }).length;
  wcard(CATS[0],[{l:'Total hours slept',v:hrs.toFixed(1)+' / 56'},{l:'Days hit 8 hrs',v:d8+' / 7'}],Math.min(100,Math.round(d8/7*100)),d8>=7,'8 hrs / night');

  var exDays=logged.filter(function(w){ var e=w.log['exercise']; return e&&e.selected&&e.selected.length>0&&!(e.selected.length===1&&e.selected[0]==='Rest'); }).length;
  var exActs=logged.reduce(function(s,w){ var e=w.log['exercise']; if(!e||!e.selected)return s; return s+e.selected.filter(function(a){return a!=='Rest';}).length; },0);
  wcard(CATS[1],[{l:'Days exercised',v:exDays+' / 7'},{l:'Total activities',v:''+exActs}],Math.min(100,Math.round(exDays/5*100)),exDays>=5,'5 days / week');

  var n4=logged.filter(function(w){ var e=w.log['nutrition']; if(!e||!e.selected)return false; return parseInt(e.selected)>=4; }).length;
  var navg=logged.length>0?(logged.reduce(function(s,w){ var e=w.log['nutrition']; return s+(e&&e.selected?parseInt(e.selected)||0:0); },0)/logged.length).toFixed(1):'--';
  wcard(CATS[2],[{l:'Days scored 4+',v:n4+' / 7'},{l:'Weekly avg',v:navg+' / 5'}],Math.min(100,Math.round(n4/7*100)),n4>=7,'Score 4 or better daily');

  var eHi=logged.filter(function(w){ var e=w.log['energy']; return e&&e.selected==='3 - High'; }).length;
  var eMid=logged.filter(function(w){ var e=w.log['energy']; return e&&e.selected==='2 - Moderate'; }).length;
  var eLo=logged.filter(function(w){ var e=w.log['energy']; return e&&e.selected==='1 - Low'; }).length;
  wcard(CATS[3],[{l:'Level 3 (high)',v:eHi+' / 5 goal'},{l:'Level 2 (moderate)',v:''+eMid},{l:'Level 1 (low)',v:''+eLo}],Math.min(100,Math.round(eHi/5*100)),eHi>=5,'Level 3 — 5 days / week');

  var s1=logged.filter(function(w){ var e=w.log['stretch']; return e&&(e.selected==='1'||e.selected==='2'); }).length;
  var stotal=logged.reduce(function(s,w){ var e=w.log['stretch']; if(!e)return s; return s+(e.selected==='2'?2:e.selected==='1'?1:0); },0);
  wcard(CATS[4],[{l:'Days with 1+ session',v:s1+' / 7'},{l:'Total sessions',v:''+stotal}],Math.min(100,Math.round(s1/7*100)),s1>=7,'1 session / day');
}

var activeTCat = 'all';

function getDays(n) {
  var days=[];
  for(var i=n-1;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i);
    var s=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    days.push({ds:s,log:lsLoad(s)});
  }
  return days;
}

function buildTrends() {
  var l7=getDays(7), l28=getDays(28);
  var avgs=l7.map(function(d){ return d.log?dayScore(d.log):null; });
  var valid=avgs.filter(function(v){ return v!==null; });
  var avg=valid.length?(valid.reduce(function(a,b){return a+b;},0)/valid.length).toFixed(1):'--';
  var logged=l28.filter(function(d){ return d.log; }).length;
  var best='--',bestS=0;
  CATS.forEach(function(c){
    var sc=l7.map(function(d){ return d.log?score(c.id,d.log[c.id]):0; }).filter(function(s){return s>0;});
    if(sc.length){ var a=sc.reduce(function(a,b){return a+b;},0)/sc.length; if(a>bestS){bestS=a;best=c.label;} }
  });
  var streak=0;
  for(var i=0;i<l7.length;i++){ if(l7[l7.length-1-i].log)streak++; else break; }

  document.getElementById('tstats').innerHTML=
    '<div class="stat"><div class="stat-l">7-day avg</div><div class="stat-v">'+avg+'</div><div class="stat-s">out of 5</div></div>'+
    '<div class="stat"><div class="stat-l">Days logged</div><div class="stat-v">'+logged+'</div><div class="stat-s">last 28 days</div></div>'+
    '<div class="stat"><div class="stat-l">Streak</div><div class="stat-v">'+streak+'</div><div class="stat-s">days in a row</div></div>'+
    '<div class="stat"><div class="stat-l">Best category</div><div class="stat-v" style="font-size:16px;padding-top:6px">'+best+'</div><div class="stat-s">this week</div></div>';

  var tbtns=document.getElementById('tbtns'); tbtns.innerHTML='';
  [{id:'all',label:'All',color:'#8b7ff5'}].concat(CATS).forEach(function(c){
    var btn=document.createElement('button');
    btn.className='tbtn'+(activeTCat===c.id?' on':'');
    btn.textContent=c.label;
    btn.style.setProperty('--tc',c.color);
    if(activeTCat===c.id){ btn.style.borderColor=c.color; btn.style.color=c.color; }
    btn.onclick=function(){ activeTCat=c.id; buildTrends(); };
    tbtns.appendChild(btn);
  });

  var bc=document.getElementById('bar-chart'); bc.innerHTML='';
  var cat=CATS.find(function(c){ return c.id===activeTCat; });
  var color=activeTCat==='all'?'#8b7ff5':cat.color;
  var maxV=5;
  l7.forEach(function(d){
    var v=d.log?(activeTCat==='all'?dayScore(d.log):score(activeTCat,d.log[activeTCat])):0;
    var pct=Math.round((v/maxV)*100);
    var lbl=new Date(d.ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
    var col=document.createElement('div'); col.className='bar-col';
    col.innerHTML='<div class="bar-fill" style="height:'+pct+'%;background:'+color+';opacity:'+(v>0?0.85:0.15)+';"></div><div class="bar-lbl">'+lbl+'</div>';
    bc.appendChild(col);
  });

  var hm=document.getElementById('heatmap'); hm.innerHTML='';
  CATS.forEach(function(c){
    var row=document.createElement('div'); row.className='hm-row';
    var lbl=document.createElement('div'); lbl.className='hm-l'; lbl.textContent=c.label; row.appendChild(lbl);
    l28.forEach(function(d){
      var cell=document.createElement('div'); cell.className='hm-cell';
      var s=d.log?score(c.id,d.log[c.id]):0;
      cell.style.background=s>0?c.color:'rgba(255,255,255,0.05)';
      cell.style.opacity=s>0?(0.2+(s/5)*0.8):'1';
      row.appendChild(cell);
    });
    hm.appendChild(row);
  });
}

function buildGoals() {
  var wdays=getWeekDays();
  var logged=wdays.filter(function(w){ return w.log&&!w.future; });
  var body=document.getElementById('goals-body');
  body.innerHTML='<div class="sec">This week vs goals</div>';

  function gcard(cat, pct, met, details, goalLabel) {
    var div=document.createElement('div'); div.className='goal-card';
    div.style.setProperty('--gc', cat.color);
    div.innerHTML='<div class="goal-hdr"><div class="goal-name"><div style="width:9px;height:9px;border-radius:50%;background:'+cat.color+'"></div>'+cat.label+'</div><div class="goal-pct" style="color:'+(met?'#3daa78':'#9a98ac')+'">'+pct+'%'+(met?' \u2713':'')+'</div></div><div class="goal-bar"><div class="goal-fill" style="width:'+pct+'%;background:'+cat.color+'"></div></div><div class="goal-detail">'+details+'</div><div class="goal-target">Goal: '+goalLabel+'</div>';
    body.appendChild(div);
  }

  var hrs=logged.reduce(function(s,w){return s+sleepHrs(w.log['sleep']);},0);
  var d8=logged.filter(function(w){return sleepHrs(w.log['sleep'])>=8;}).length;
  gcard(CATS[0],Math.min(100,Math.round(d8/7*100)),d8>=7,hrs.toFixed(1)+' hrs total (goal 56) &middot; '+d8+'/7 days at 8 hrs','8 hrs / night');

  var exDays=logged.filter(function(w){var e=w.log['exercise'];return e&&e.selected&&e.selected.length>0&&!(e.selected.length===1&&e.selected[0]==='Rest');}).length;
  var exActs=logged.reduce(function(s,w){var e=w.log['exercise'];if(!e||!e.selected)return s;return s+e.selected.filter(function(a){return a!=='Rest';}).length;},0);
  gcard(CATS[1],Math.min(100,Math.round(exDays/5*100)),exDays>=5,exDays+'/5 days active &middot; '+exActs+' total activities','5 days / week');

  var n4=logged.filter(function(w){var e=w.log['nutrition'];return e&&parseInt(e.selected)>=4;}).length;
  gcard(CATS[2],Math.min(100,Math.round(n4/7*100)),n4>=7,n4+'/7 days scored 4 or better','Score 4 or better daily');

  var eHi=logged.filter(function(w){var e=w.log['energy'];return e&&e.selected==='3 - High';}).length;
  gcard(CATS[3],Math.min(100,Math.round(eHi/5*100)),eHi>=5,eHi+'/5 days at level 3 (high energy)','Level 3 — 5 days / week');

  var s1=logged.filter(function(w){var e=w.log['stretch'];return e&&(e.selected==='1'||e.selected==='2');}).length;
  var stotal=logged.reduce(function(s,w){var e=w.log['stretch'];if(!e)return s;return s+(e.selected==='2'?2:e.selected==='1'?1:0);},0);
  gcard(CATS[4],Math.min(100,Math.round(s1/7*100)),s1>=7,s1+'/7 days with 1+ session &middot; '+stotal+' total sessions','1 session / day');
}

function showTab(name, skipBuild) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (!skipBuild) {
    if (name==='log')      openLog(td());
    if (name==='calendar') buildCal();
    if (name==='trends')   buildTrends();
    if (name==='goals')    buildGoals();
  }
}

syncFromServer(function(){ openLog(td()); });
</script>
