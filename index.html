<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wellness">
<meta name="theme-color" content="#3d4127">
<link rel="manifest" href="manifest.json">
<title>Wellness</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#2a2d1a;
  --card:#3d4127;
  --chip:#2a2d1a;
  --accent1:#d4de95;
  --accent2:#bac095;
  --accent3:#a8b56a;
  --accent4:#8fa852;
  --accent5:#636b2f;
  --dim:#7a8257;
  --text:#e8ecca;
  --tab-h:84px;
  --pb:24px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
#header{background:var(--card);padding:16px 16px 12px;padding-top:calc(16px + env(safe-area-inset-top));flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
#header h1{font-size:20px;font-weight:700;color:var(--accent1);letter-spacing:.5px;}
#date-nav{display:flex;align-items:center;gap:8px;}
#date-nav button{background:none;border:none;color:var(--accent2);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;}
#date-display{font-size:14px;color:var(--accent2);font-weight:500;min-width:110px;text-align:center;}

/* MAIN SCROLL */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + 8px);}

/* TAB BAR */
#tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);padding-bottom:var(--pb);background:var(--card);display:flex;align-items:flex-start;justify-content:space-around;border-top:1px solid rgba(255,255,255,.06);z-index:100;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;padding-top:10px;color:var(--dim);transition:color .2s;}
.tab-btn.active{color:var(--accent1);}
.tab-btn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab-btn span{font-size:10px;font-weight:600;letter-spacing:.3px;}

/* TABS */
.tab-content{display:none;padding:12px 12px 0;}
.tab-content.active{display:block;}

/* CARDS */
.card{background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.card-accent{height:4px;}
.card-body{padding:14px;}
.card-title{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent2);margin-bottom:2px;}
.card-hint{font-size:11px;color:var(--dim);margin-bottom:10px;}

/* CHIPS */
.chip-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.chip{background:var(--chip);border:1.5px solid transparent;border-radius:20px;padding:6px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:all .15s;user-select:none;}
.chip.selected{border-color:var(--accent1);color:var(--accent1);}
.chip.rest{border-color:transparent;}
.chip.rest.selected{border-color:var(--accent3);color:var(--accent3);}

/* PILL GROUP */
.pill-group-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pill-group-label{font-size:12px;color:var(--dim);font-weight:600;white-space:nowrap;}
.pill-group{display:flex;border:1.5px solid rgba(255,255,255,.1);border-radius:20px;overflow:hidden;}
.pill{background:transparent;border:none;padding:6px 14px;font-size:13px;color:var(--dim);cursor:pointer;transition:all .15s;user-select:none;position:relative;}
.pill+.pill::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:1px;background:rgba(255,255,255,.1);}
.pill.selected{background:var(--accent5);color:var(--text);}

/* EXERCISE */
.ex-section-label{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase;}

/* NOTES */
.notes-area{width:100%;background:var(--chip);border:1.5px solid transparent;border-radius:10px;padding:10px;color:var(--text);font-size:13px;resize:none;min-height:60px;margin-top:4px;outline:none;font-family:inherit;transition:border-color .15s;}
.notes-area:focus{border-color:var(--dim);}

/* ACTIONS */
#back-today{display:none;width:100%;padding:11px;background:transparent;border:1.5px solid var(--accent3);border-radius:12px;color:var(--accent3);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:.3px;}
#save-btn{width:100%;padding:13px;background:var(--accent5);border:none;border-radius:12px;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
#save-btn:active{opacity:.8;}
#save-feedback{text-align:center;font-size:13px;color:var(--accent3);height:20px;margin-top:6px;transition:opacity .3s;}

/* CALENDAR */
#cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 8px;}
#cal-header button{background:none;border:none;color:var(--accent2);font-size:22px;cursor:pointer;padding:4px 10px;}
#cal-month-label{font-size:16px;font-weight:700;color:var(--accent1);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;color:var(--dim);font-weight:700;padding:4px 0 6px;letter-spacing:.5px;}
.cal-day{background:var(--card);border-radius:8px;min-height:56px;padding:5px 4px 3px;cursor:pointer;position:relative;transition:background .15s;display:flex;flex-direction:column;}
.cal-day:hover{background:#4a5030;}
.cal-day.today{box-shadow:0 0 0 2px var(--accent1);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:11px;font-weight:600;color:var(--text);line-height:1;}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;flex:1;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.cal-prog-bar{height:3px;border-radius:2px;margin-top:auto;background:rgba(255,255,255,.07);overflow:hidden;}
.cal-prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent3),var(--accent1));}

/* WEEK SUMMARY */
#week-summary{margin-top:16px;}
#week-summary h3{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.week-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.week-card-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.week-card-info{flex:1;}
.week-card-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:2px;}
.week-card-detail{font-size:11px;color:var(--dim);}
.week-card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.badge-met{background:rgba(100,160,50,.2);color:var(--accent3);}
.badge-prog{background:rgba(120,130,80,.15);color:var(--dim);}
.week-prog-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:6px;overflow:hidden;}
.week-prog-fill{height:100%;border-radius:2px;}

/* TRENDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:12px;padding:12px;}
.stat-val{font-size:24px;font-weight:800;color:var(--accent1);}
.stat-label{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-btn{background:var(--chip);border:1.5px solid transparent;border-radius:16px;padding:5px 12px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .15s;}
.filter-btn.active{border-color:var(--accent1);color:var(--accent1);}

/* BAR CHART */
.chart-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:700;color:var(--accent2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:12px;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s ease;}
.bar-label{font-size:9px;color:var(--dim);font-weight:600;}
.bar-val{font-size:9px;color:var(--dim);}

/* HEATMAP */
.heatmap-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;}
.heatmap-title{font-size:12px;font-weight:700;color:var(--accent2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.hm-cell{aspect-ratio:1;border-radius:4px;background:rgba(255,255,255,.05);}
.hm-label{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.hm-lbl{font-size:8px;color:var(--dim);text-align:center;font-weight:600;}

/* GOALS */
.goal-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid;}
.goal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.goal-title{font-size:14px;font-weight:700;color:var(--text);}
.goal-label{font-size:11px;color:var(--dim);margin-top:2px;}
.goal-pct{font-size:20px;font-weight:800;color:var(--accent1);}
.goal-bar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:8px;}
.goal-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.goal-detail{font-size:11px;color:var(--dim);margin-top:6px;}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>Wellness</h1>
  <div id="date-nav">
    <button id="prev-day" aria-label="Previous day">&#8249;</button>
    <span id="date-display"></span>
    <button id="next-day" aria-label="Next day">&#8250;</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LOG TAB -->
  <div id="tab-log" class="tab-content active">
    <button id="back-today">&#8592; Back to Today</button>

    <!-- Sleep -->
    <div class="card">
      <div class="card-accent" style="background:#d4de95"></div>
      <div class="card-body">
        <div class="card-title">Sleep</div>
        <div class="card-hint">last night's sleep</div>
        <div class="chip-group" id="sleep-chips"></div>
        <textarea class="notes-area" id="sleep-notes" placeholder="Notes..." rows="2"></textarea>
      </div>
    </div>

    <!-- Exercise -->
    <div class="card">
      <div class="card-accent" style="background:#bac095"></div>
      <div class="card-body">
        <div class="card-title">Exercise</div>
        <div class="ex-section-label">Cardio</div>
        <div class="chip-group" id="cardio-chips"></div>
        <div class="pill-group-wrap">
          <span class="pill-group-label">Weights</span>
          <div class="pill-group" id="weights-pills"></div>
        </div>
        <div class="chip-group" id="ex-other-chips"></div>
        <textarea class="notes-area" id="exercise-notes" placeholder="Notes..." rows="2"></textarea>
      </div>
    </div>

    <!-- Nutrition -->
    <div class="card">
      <div class="card-accent" style="background:#a8b56a"></div>
      <div class="card-body">
        <div class="card-title">Nutrition</div>
        <div class="chip-group" id="nutrition-chips"></div>
        <textarea class="notes-area" id="nutrition-notes" placeholder="Notes..." rows="2"></textarea>
      </div>
    </div>

    <!-- Energy -->
    <div class="card">
      <div class="card-accent" style="background:#8fa852"></div>
      <div class="card-body">
        <div class="card-title">Energy</div>
        <div class="chip-group" id="energy-chips"></div>
        <textarea class="notes-area" id="energy-notes" placeholder="Notes..." rows="2"></textarea>
      </div>
    </div>

    <!-- Stretch -->
    <div class="card">
      <div class="card-accent" style="background:#636b2f"></div>
      <div class="card-body">
        <div class="card-title">Stretch</div>
        <div class="chip-group" id="stretch-chips"></div>
        <textarea class="notes-area" id="stretch-notes" placeholder="Notes..." rows="2"></textarea>
      </div>
    </div>

    <button id="save-btn">Save</button>
    <div id="save-feedback"></div>
    <div style="height:8px"></div>
  </div>

  <!-- CALENDAR TAB -->
  <div id="tab-cal" class="tab-content">
    <div id="cal-header">
      <button id="cal-prev">&#8249;</button>
      <span id="cal-month-label"></span>
      <button id="cal-next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="week-summary"></div>
    <div style="height:8px"></div>
  </div>

  <!-- TRENDS TAB -->
  <div id="tab-trends" class="tab-content">
    <div style="height:8px"></div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="filter-row" id="filter-row"></div>
    <div class="chart-card">
      <div class="chart-title">7-Day History</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="heatmap-card">
      <div class="heatmap-title">4-Week Heatmap</div>
      <div class="hm-label" id="hm-labels"></div>
      <div class="heatmap-grid" id="heatmap"></div>
    </div>
    <div style="height:8px"></div>
  </div>

  <!-- GOALS TAB -->
  <div id="tab-goals" class="tab-content">
    <div style="height:8px"></div>
    <div id="goals-list"></div>
    <div style="height:8px"></div>
  </div>

</div>

<!-- TAB BAR -->
<div id="tabbar">
  <button class="tab-btn active" data-tab="log">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    <span>Log</span>
  </button>
  <button class="tab-btn" data-tab="cal">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>Calendar</span>
  </button>
  <button class="tab-btn" data-tab="trends">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Trends</span>
  </button>
  <button class="tab-btn" data-tab="goals">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    <span>Goals</span>
  </button>
</div>

<script>
var SLEEP_OPTS = ["4 or less","5","6","7","8","9 or more"];
var SLEEP_HRS  = [3.5, 5, 6, 7, 8, 9.5];
var CARDIO     = ["Run","Bike","Hike"];
var WEIGHTS    = ["Pull","Push","Legs"];
var NUTR_OPTS  = ["1","2","3","4","5"];
var ENERGY_OPTS= ["1 \u2014 Low","2 \u2014 Moderate","3 \u2014 High"];
var STRETCH_OPTS=["0","1","2"];
var CAT_COLORS = {sleep:"#d4de95",exercise:"#bac095",nutrition:"#a8b56a",energy:"#8fa852",stretch:"#636b2f"};
var DAYS_OF_WEEK = ["Su","Mo","Tu","We","Th","Fr","Sa"];

var currentDateStr = todayStr();
var calYear, calMonth;
var trendsCategory = "sleep";

function todayStr() { return fmtDate(new Date()); }
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(s) { var p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function addDays(s,n) { var d=parseDate(s); d.setDate(d.getDate()+n); return fmtDate(d); }
function displayDate(s) { return parseDate(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

function loadDay(ds) { try{return JSON.parse(localStorage.getItem('wc_'+ds))||{};}catch(e){return{};} }
function saveDay(ds,data) { localStorage.setItem('wc_'+ds,JSON.stringify(data)); }

function buildSleepChips() {
  var el=document.getElementById('sleep-chips'); el.innerHTML='';
  SLEEP_OPTS.forEach(function(o,i){
    var c=document.createElement('div'); c.className='chip'; c.dataset.val=i; c.textContent=o;
    c.addEventListener('click',function(){toggleSingle('sleep-chips',i);}); el.appendChild(c);
  });
}
function buildNutrChips() {
  var el=document.getElementById('nutrition-chips'); el.innerHTML='';
  NUTR_OPTS.forEach(function(o,i){
    var c=document.createElement('div'); c.className='chip'; c.dataset.val=i; c.textContent=o;
    c.addEventListener('click',function(){toggleSingle('nutrition-chips',i);}); el.appendChild(c);
  });
}
function buildEnergyChips() {
  var el=document.getElementById('energy-chips'); el.innerHTML='';
  ENERGY_OPTS.forEach(function(o,i){
    var c=document.createElement('div'); c.className='chip'; c.dataset.val=i; c.textContent=o;
    c.addEventListener('click',function(){toggleSingle('energy-chips',i);}); el.appendChild(c);
  });
}
function buildStretchChips() {
  var el=document.getElementById('stretch-chips'); el.innerHTML='';
  STRETCH_OPTS.forEach(function(o,i){
    var c=document.createElement('div'); c.className='chip'; c.dataset.val=i; c.textContent=o;
    c.addEventListener('click',function(){toggleSingle('stretch-chips',i);}); el.appendChild(c);
  });
}
function buildCardioChips() {
  var el=document.getElementById('cardio-chips'); el.innerHTML='';
  CARDIO.forEach(function(o){
    var c=document.createElement('div'); c.className='chip'; c.dataset.val=o; c.textContent=o;
    c.addEventListener('click',function(){toggleCardio(o);}); el.appendChild(c);
  });
}
function buildWeightsPills() {
  var el=document.getElementById('weights-pills'); el.innerHTML='';
  WEIGHTS.forEach(function(o){
    var p=document.createElement('button'); p.className='pill'; p.dataset.val=o; p.textContent=o;
    p.addEventListener('click',function(){toggleWeight(o);}); el.appendChild(p);
  });
}
function buildExOtherChips() {
  var el=document.getElementById('ex-other-chips'); el.innerHTML='';
  ['Other','Rest Day'].forEach(function(o){
    var c=document.createElement('div');
    c.className='chip'+(o==='Rest Day'?' rest':''); c.dataset.val=o; c.textContent=o;
    c.addEventListener('click',function(){toggleExOther(o);}); el.appendChild(c);
  });
}

function toggleSingle(groupId,idx) {
  var chips=Array.from(document.getElementById(groupId).querySelectorAll('.chip'));
  var was=chips[idx].classList.contains('selected');
  chips.forEach(function(c){c.classList.remove('selected');});
  if(!was) chips[idx].classList.add('selected');
}
function getSelectedSingle(groupId) {
  var sel=document.getElementById(groupId).querySelector('.chip.selected');
  return sel?parseInt(sel.dataset.val):null;
}
function setSelectedSingle(groupId,idx) {
  Array.from(document.getElementById(groupId).querySelectorAll('.chip')).forEach(function(c,i){c.classList.toggle('selected',i===idx);});
}

function clearRestDay() { var r=document.querySelector('#ex-other-chips .chip.rest'); if(r) r.classList.remove('selected'); }
function toggleCardio(val) {
  clearRestDay();
  var c=document.querySelector('#cardio-chips .chip[data-val="'+val+'"]'); if(c) c.classList.toggle('selected');
}
function toggleWeight(val) {
  clearRestDay();
  var p=document.querySelector('#weights-pills .pill[data-val="'+val+'"]'); if(p) p.classList.toggle('selected');
}
function toggleExOther(val) {
  if(val==='Rest Day'){
    var rest=document.querySelector('#ex-other-chips .chip.rest');
    var nowOn=rest&&!rest.classList.contains('selected');
    document.querySelectorAll('#cardio-chips .chip,#weights-pills .pill,#ex-other-chips .chip').forEach(function(c){c.classList.remove('selected');});
    if(nowOn&&rest) rest.classList.add('selected');
  } else {
    clearRestDay();
    var c=Array.from(document.querySelectorAll('#ex-other-chips .chip')).find(function(x){return x.dataset.val===val;});
    if(c) c.classList.toggle('selected');
  }
}

function getExData() {
  return {
    cardio:CARDIO.filter(function(v){var e=document.querySelector('#cardio-chips .chip[data-val="'+v+'"]');return e&&e.classList.contains('selected');}),
    weights:WEIGHTS.filter(function(v){var e=document.querySelector('#weights-pills .pill[data-val="'+v+'"]');return e&&e.classList.contains('selected');}),
    other:!!(document.querySelector('#ex-other-chips .chip[data-val="Other"]')&&document.querySelector('#ex-other-chips .chip[data-val="Other"]').classList.contains('selected')),
    rest:!!(document.querySelector('#ex-other-chips .chip.rest')&&document.querySelector('#ex-other-chips .chip.rest').classList.contains('selected'))
  };
}
function setExData(ex) {
  ex=ex||{};
  (ex.cardio||[]).forEach(function(v){var e=document.querySelector('#cardio-chips .chip[data-val="'+v+'"]');if(e)e.classList.add('selected');});
  (ex.weights||[]).forEach(function(v){var e=document.querySelector('#weights-pills .pill[data-val="'+v+'"]');if(e)e.classList.add('selected');});
  if(ex.other){var e=document.querySelector('#ex-other-chips .chip[data-val="Other"]');if(e)e.classList.add('selected');}
  if(ex.rest){var e=document.querySelector('#ex-other-chips .chip.rest');if(e)e.classList.add('selected');}
}

function hasCatData(data,cat) {
  if(!data||!data[cat]) return false;
  if(cat==='exercise'){var ex=data.exercise;return(ex.cardio&&ex.cardio.length>0)||(ex.weights&&ex.weights.length>0)||ex.other||ex.rest;}
  return data[cat].val!=null;
}

function loadDayIntoLog(ds) {
  var data=loadDay(ds);
  document.querySelectorAll('#sleep-chips .chip,#nutrition-chips .chip,#energy-chips .chip,#stretch-chips .chip').forEach(function(c){c.classList.remove('selected');});
  document.querySelectorAll('#cardio-chips .chip,#weights-pills .pill,#ex-other-chips .chip').forEach(function(c){c.classList.remove('selected');});
  ['sleep','exercise','nutrition','energy','stretch'].forEach(function(k){document.getElementById(k+'-notes').value='';});

  if(data.sleep&&data.sleep.val!=null) setSelectedSingle('sleep-chips',data.sleep.val);
  if(data.sleep&&data.sleep.notes) document.getElementById('sleep-notes').value=data.sleep.notes;
  if(data.exercise) setExData(data.exercise);
  if(data.exercise&&data.exercise.notes) document.getElementById('exercise-notes').value=data.exercise.notes;
  if(data.nutrition&&data.nutrition.val!=null) setSelectedSingle('nutrition-chips',data.nutrition.val);
  if(data.nutrition&&data.nutrition.notes) document.getElementById('nutrition-notes').value=data.nutrition.notes;
  if(data.energy&&data.energy.val!=null) setSelectedSingle('energy-chips',data.energy.val);
  if(data.energy&&data.energy.notes) document.getElementById('energy-notes').value=data.energy.notes;
  if(data.stretch&&data.stretch.val!=null) setSelectedSingle('stretch-chips',data.stretch.val);
  if(data.stretch&&data.stretch.notes) document.getElementById('stretch-notes').value=data.stretch.notes;

  document.getElementById('back-today').style.display=(ds===todayStr())?'none':'block';
  document.getElementById('date-display').textContent=displayDate(ds);
  var nb=document.getElementById('next-day');
  nb.style.opacity=(ds>=todayStr())?'0.3':'1';
  nb.disabled=(ds>=todayStr());
}

function saveCurrentLog() {
  var ex=getExData();
  ex.notes=document.getElementById('exercise-notes').value;
  var data={
    sleep:{val:getSelectedSingle('sleep-chips'),notes:document.getElementById('sleep-notes').value},
    exercise:ex,
    nutrition:{val:getSelectedSingle('nutrition-chips'),notes:document.getElementById('nutrition-notes').value},
    energy:{val:getSelectedSingle('energy-chips'),notes:document.getElementById('energy-notes').value},
    stretch:{val:getSelectedSingle('stretch-chips'),notes:document.getElementById('stretch-notes').value}
  };
  saveDay(currentDateStr,data);
  var fb=document.getElementById('save-feedback');
  fb.textContent='Saved \u2713'; fb.style.opacity='1';
  setTimeout(function(){fb.style.opacity='0';},1800);
}

document.getElementById('prev-day').addEventListener('click',function(){currentDateStr=addDays(currentDateStr,-1);loadDayIntoLog(currentDateStr);});
document.getElementById('next-day').addEventListener('click',function(){if(currentDateStr>=todayStr())return;currentDateStr=addDays(currentDateStr,1);loadDayIntoLog(currentDateStr);});
document.getElementById('back-today').addEventListener('click',function(){currentDateStr=todayStr();loadDayIntoLog(currentDateStr);});
document.getElementById('save-btn').addEventListener('click',saveCurrentLog);

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var tab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('header').style.display=(tab==='log')?'flex':'none';
    if(tab==='cal') renderCalendar();
    if(tab==='trends') renderTrends();
    if(tab==='goals') renderGoals();
    document.getElementById('main').scrollTop=0;
  });
});

function initCal(){var t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();}
document.getElementById('cal-prev').addEventListener('click',function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();});
document.getElementById('cal-next').addEventListener('click',function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();});

function renderCalendar(){
  var grid=document.getElementById('cal-grid');
  var label=document.getElementById('cal-month-label');
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  label.textContent=months[calMonth]+' '+calYear;
  grid.innerHTML='';
  DAYS_OF_WEEK.forEach(function(d){var el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var dim=new Date(calYear,calMonth+1,0).getDate();
  var prev=new Date(calYear,calMonth,0).getDate();
  var today=todayStr();
  for(var i=firstDay-1;i>=0;i--) grid.appendChild(makeDayCell(fmtDate(new Date(calYear,calMonth-1,prev-i)),true,today));
  for(var d=1;d<=dim;d++) grid.appendChild(makeDayCell(fmtDate(new Date(calYear,calMonth,d)),false,today));
  var fill=(firstDay+dim)%7===0?0:7-(firstDay+dim)%7;
  for(var d2=1;d2<=fill;d2++) grid.appendChild(makeDayCell(fmtDate(new Date(calYear,calMonth+1,d2)),true,today));
  renderWeekSummary();
}

function makeDayCell(ds,other,today){
  var cell=document.createElement('div');
  cell.className='cal-day'+(other?' other-month':'')+(ds===today?' today':'');
  var data=loadDay(ds);
  var num=document.createElement('div');num.className='cal-day-num';num.textContent=parseDate(ds).getDate();cell.appendChild(num);
  var dots=document.createElement('div');dots.className='cal-dots';
  var logged=0;
  ['sleep','exercise','nutrition','energy','stretch'].forEach(function(cat){
    if(hasCatData(data,cat)){logged++;var dot=document.createElement('div');dot.className='cal-dot';dot.style.background=CAT_COLORS[cat];dots.appendChild(dot);}
  });
  cell.appendChild(dots);
  var prog=document.createElement('div');prog.className='cal-prog-bar';
  var fill=document.createElement('div');fill.className='cal-prog-fill';fill.style.width=(logged/5*100)+'%';
  prog.appendChild(fill);cell.appendChild(prog);
  cell.addEventListener('click',function(){
    currentDateStr=ds;
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    document.querySelector('[data-tab="log"]').classList.add('active');
    document.getElementById('tab-log').classList.add('active');
    document.getElementById('header').style.display='flex';
    loadDayIntoLog(ds);
    document.getElementById('main').scrollTop=0;
  });
  return cell;
}

function getDays(n){var a=[];for(var i=n-1;i>=0;i--) a.push(addDays(todayStr(),-i));return a;}

function renderWeekSummary(){
  var ws=document.getElementById('week-summary');ws.innerHTML='<h3>This Week</h3>';
  var today=new Date(),dow=today.getDay(),wd=[];
  for(var i=0;i<7;i++){var d=new Date(today);d.setDate(today.getDate()-dow+i);wd.push(fmtDate(d));}
  var wdata=wd.map(function(ds){return{ds:ds,data:loadDay(ds)};});

  var sd=wdata.filter(function(x){return x.data.sleep&&x.data.sleep.val!=null;});
  var sh=sd.reduce(function(a,x){return a+SLEEP_HRS[x.data.sleep.val];},0);
  var s8=sd.filter(function(x){return SLEEP_HRS[x.data.sleep.val]>=8;}).length;
  ws.appendChild(mkWCard('Sleep','#d4de95',sh.toFixed(1)+' hrs / 56 \u2022 '+s8+' days hit 8hrs',s8/7*100,s8>=5));

  var ed=wdata.filter(function(x){return hasCatData(x.data,'exercise')&&!x.data.exercise.rest;});
  var ea=wdata.reduce(function(a,x){if(!x.data.exercise)return a;return a+(x.data.exercise.cardio?x.data.exercise.cardio.length:0)+(x.data.exercise.weights?x.data.exercise.weights.length:0)+(x.data.exercise.other?1:0);},0);
  ws.appendChild(mkWCard('Exercise','#bac095',ed.length+' days / 7 \u2022 '+ea+' activities',ed.length/7*100,ed.length>=5));

  var nd=wdata.filter(function(x){return x.data.nutrition&&x.data.nutrition.val!=null;});
  var n4=nd.filter(function(x){return x.data.nutrition.val>=3;}).length;
  var na=nd.length?nd.reduce(function(a,x){return a+(x.data.nutrition.val+1);},0)/nd.length:0;
  ws.appendChild(mkWCard('Nutrition','#a8b56a',n4+' days scored 4+ / 7 \u2022 avg '+na.toFixed(1),n4/7*100,n4>=7));

  var egd=wdata.filter(function(x){return x.data.energy&&x.data.energy.val!=null;});
  var e3=egd.filter(function(x){return x.data.energy.val===2;}).length;
  var e2=egd.filter(function(x){return x.data.energy.val===1;}).length;
  var e1=egd.filter(function(x){return x.data.energy.val===0;}).length;
  ws.appendChild(mkWCard('Energy','#8fa852','Level 3: '+e3+' \u2022 Level 2: '+e2+' \u2022 Level 1: '+e1,e3/5*100,e3>=5));

  var std=wdata.filter(function(x){return x.data.stretch&&x.data.stretch.val!=null&&x.data.stretch.val>0;});
  var sts=wdata.reduce(function(a,x){return a+(x.data.stretch&&x.data.stretch.val!=null?parseInt(STRETCH_OPTS[x.data.stretch.val]):0);},0);
  ws.appendChild(mkWCard('Stretch','#636b2f',std.length+' days with 1+ session / 7 \u2022 '+sts+' total',std.length/7*100,std.length>=7));
}

function mkWCard(title,color,detail,pct,met){
  var card=document.createElement('div');card.className='week-card';
  var icon=document.createElement('div');icon.className='week-card-icon';icon.style.background=color;
  var info=document.createElement('div');info.className='week-card-info';
  var t=document.createElement('div');t.className='week-card-title';t.textContent=title;
  var d=document.createElement('div');d.className='week-card-detail';d.textContent=detail;
  var bar=document.createElement('div');bar.className='week-prog-bar';
  var fill=document.createElement('div');fill.className='week-prog-fill';fill.style.background=color;fill.style.width=Math.min(pct,100)+'%';
  bar.appendChild(fill);info.appendChild(t);info.appendChild(d);info.appendChild(bar);
  var badge=document.createElement('div');badge.className='week-card-badge '+(met?'badge-met':'badge-prog');
  badge.textContent=met?'Goal met \u2713':'In progress';
  card.appendChild(icon);card.appendChild(info);card.appendChild(badge);
  return card;
}

function renderTrends(){renderStatCards();renderFilterRow();renderBarChart();renderHeatmap();}

function catVal(data,cat){
  if(!data||!hasCatData(data,cat)) return null;
  if(cat==='sleep') return data.sleep.val!=null?SLEEP_HRS[data.sleep.val]/9.5:null;
  if(cat==='exercise'){if(data.exercise.rest)return 0;var a=(data.exercise.cardio?data.exercise.cardio.length:0)+(data.exercise.weights?data.exercise.weights.length:0)+(data.exercise.other?1:0);return Math.min(a/3,1);}
  if(cat==='nutrition') return data.nutrition.val!=null?data.nutrition.val/4:null;
  if(cat==='energy') return data.energy.val!=null?data.energy.val/2:null;
  if(cat==='stretch') return data.stretch.val!=null?data.stretch.val/2:null;
  return null;
}

function fmtCatVal(cat,v){
  if(cat==='sleep') return (v*9.5).toFixed(1)+'h';
  if(cat==='exercise') return Math.round(v*3)+'';
  if(cat==='nutrition') return Math.round(v*4+1)+'';
  if(cat==='energy') return Math.round(v*2+1)+'';
  if(cat==='stretch') return Math.round(v*2)+'';
  return '';
}

function renderStatCards(){
  var grid=document.getElementById('stat-grid');grid.innerHTML='';
  var d28=getDays(28),d7=getDays(7);
  var logged28=d28.filter(function(ds){return Object.keys(loadDay(ds)).length>0;}).length;
  var sv=d7.map(function(ds){var d=loadDay(ds);return d.sleep&&d.sleep.val!=null?SLEEP_HRS[d.sleep.val]:null;}).filter(function(v){return v!=null;});
  var savg=sv.length?sv.reduce(function(a,b){return a+b;},0)/sv.length:0;
  grid.appendChild(mkSCard(savg.toFixed(1)+'h','7-Day Sleep Avg'));
  grid.appendChild(mkSCard(logged28+'/28','Days Logged'));
  var streak=0,sd=todayStr();while(Object.keys(loadDay(sd)).length>0){streak++;sd=addDays(sd,-1);}
  grid.appendChild(mkSCard(streak,'Day Streak'));
  var cats=['sleep','exercise','nutrition','energy','stretch'],best='-',bestN=-1;
  cats.forEach(function(cat){var n=d28.filter(function(ds){return hasCatData(loadDay(ds),cat);}).length;if(n>bestN){bestN=n;best=cat.charAt(0).toUpperCase()+cat.slice(1);}});
  grid.appendChild(mkSCard(best,'Best Category'));
}
function mkSCard(val,lbl){
  var c=document.createElement('div');c.className='stat-card';
  var v=document.createElement('div');v.className='stat-val';v.textContent=val;
  var l=document.createElement('div');l.className='stat-label';l.textContent=lbl;
  c.appendChild(v);c.appendChild(l);return c;
}

function renderFilterRow(){
  var row=document.getElementById('filter-row');row.innerHTML='';
  ['sleep','exercise','nutrition','energy','stretch'].forEach(function(cat){
    var btn=document.createElement('button');
    btn.className='filter-btn'+(cat===trendsCategory?' active':'');
    btn.textContent=cat.charAt(0).toUpperCase()+cat.slice(1);
    if(cat===trendsCategory){btn.style.borderColor=CAT_COLORS[cat];btn.style.color=CAT_COLORS[cat];}
    btn.addEventListener('click',function(){trendsCategory=cat;renderFilterRow();renderBarChart();renderHeatmap();});
    row.appendChild(btn);
  });
}

function renderBarChart(){
  var chart=document.getElementById('bar-chart');chart.innerHTML='';
  var days=getDays(7),color=CAT_COLORS[trendsCategory];
  var vals=days.map(function(ds){return catVal(loadDay(ds),trendsCategory);});
  var nn=vals.filter(function(v){return v!=null;});
  var mx=nn.length?Math.max.apply(null,nn):1;
  days.forEach(function(ds,i){
    var col=document.createElement('div');col.className='bar-col';
    var v=vals[i];
    var bar=document.createElement('div');bar.className='bar-fill';
    bar.style.height=(v!=null?v/Math.max(mx,0.01)*80+2:2)+'px';
    bar.style.background=v!=null?color:'rgba(255,255,255,.06)';
    var d=parseDate(ds);
    var lbl=document.createElement('div');lbl.className='bar-label';lbl.textContent=DAYS_OF_WEEK[d.getDay()];
    var ve=document.createElement('div');ve.className='bar-val';ve.textContent=v!=null?fmtCatVal(trendsCategory,v):'';
    col.appendChild(bar);col.appendChild(lbl);col.appendChild(ve);chart.appendChild(col);
  });
}

function hexA(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a.toFixed(2)+')';}

function renderHeatmap(){
  var hm=document.getElementById('heatmap'),lbls=document.getElementById('hm-labels');
  hm.innerHTML='';lbls.innerHTML='';
  DAYS_OF_WEEK.forEach(function(d){var el=document.createElement('div');el.className='hm-lbl';el.textContent=d;lbls.appendChild(el);});
  var days=getDays(28),color=CAT_COLORS[trendsCategory];
  var fdow=parseDate(days[0]).getDay();
  for(var i=0;i<fdow;i++){var p=document.createElement('div');p.className='hm-cell';hm.appendChild(p);}
  days.forEach(function(ds){
    var v=catVal(loadDay(ds),trendsCategory);
    var c=document.createElement('div');c.className='hm-cell';
    if(v!=null) c.style.background=hexA(color,0.2+v*0.8);
    c.title=ds+(v!=null?' '+fmtCatVal(trendsCategory,v):'');
    hm.appendChild(c);
  });
}

var GOALS=[
  {color:'#d4de95',title:'Sleep 8 hrs / night',label:'7 days / week',check:function(wd){
    var m=wd.filter(function(ds){var d=loadDay(ds);return d.sleep&&d.sleep.val!=null&&SLEEP_HRS[d.sleep.val]>=8;}).length;
    return{pct:m/7*100,detail:m+' / 7 days this week hit 8+ hrs'};
  }},
  {color:'#bac095',title:'Exercise 5 days / week',label:'5 days / week',check:function(wd){
    var m=wd.filter(function(ds){var d=loadDay(ds);return hasCatData(d,'exercise')&&!d.exercise.rest;}).length;
    return{pct:m/5*100,detail:m+' / 5 days this week'};
  }},
  {color:'#a8b56a',title:'Score 4 or better daily',label:'Daily',check:function(wd){
    var m=wd.filter(function(ds){var d=loadDay(ds);return d.nutrition&&d.nutrition.val!=null&&d.nutrition.val>=3;}).length;
    return{pct:m/7*100,detail:m+' / 7 days scored 4+'};
  }},
  {color:'#8fa852',title:'Level 3 energy',label:'5 days / week',check:function(wd){
    var m=wd.filter(function(ds){var d=loadDay(ds);return d.energy&&d.energy.val===2;}).length;
    return{pct:m/5*100,detail:m+' / 5 days at level 3'};
  }},
  {color:'#636b2f',title:'1 stretch session / day',label:'Daily',check:function(wd){
    var m=wd.filter(function(ds){var d=loadDay(ds);return d.stretch&&d.stretch.val!=null&&parseInt(STRETCH_OPTS[d.stretch.val])>=1;}).length;
    return{pct:m/7*100,detail:m+' / 7 days had a session'};
  }}
];

function renderGoals(){
  var list=document.getElementById('goals-list');list.innerHTML='';
  var today=new Date(),dow=today.getDay(),wd=[];
  for(var i=0;i<7;i++){var d=new Date(today);d.setDate(today.getDate()-dow+i);wd.push(fmtDate(d));}
  GOALS.forEach(function(g){
    var r=g.check(wd),pct=r.pct,detail=r.detail;
    var card=document.createElement('div');card.className='goal-card';card.style.borderColor=g.color;
    var hdr=document.createElement('div');hdr.className='goal-header';
    var left=document.createElement('div');
    var t=document.createElement('div');t.className='goal-title';t.textContent=g.title;
    var lbl=document.createElement('div');lbl.className='goal-label';lbl.textContent=g.label;
    left.appendChild(t);left.appendChild(lbl);
    var pe=document.createElement('div');pe.className='goal-pct';pe.style.color=g.color;pe.textContent=Math.round(Math.min(pct,100))+'%';
    hdr.appendChild(left);hdr.appendChild(pe);
    var bar=document.createElement('div');bar.className='goal-bar';
    var fill=document.createElement('div');fill.className='goal-bar-fill';fill.style.background=g.color;fill.style.width=Math.min(pct,100)+'%';
    bar.appendChild(fill);
    var det=document.createElement('div');det.className='goal-detail';det.textContent=detail;
    card.appendChild(hdr);card.appendChild(bar);card.appendChild(det);
    list.appendChild(card);
  });
}

buildSleepChips();buildNutrChips();buildEnergyChips();buildStretchChips();buildCardioChips();buildWeightsPills();buildExOtherChips();
initCal();
loadDayIntoLog(currentDateStr);
</script>
